{% extends "base.html" %}
{% block title %}Choco-tube-plus{% endblock %}
{% block body_class %}page-home{% endblock %}
{% block content %}
<main class="home-main">
  <section class="home-hero">
    <div class="home-hero-logo">
      <span class="logo-inv">Choco</span><span class="logo-tube">-tube-plus</span>
    </div>
    <p class="home-hero-sub">プライバシーを守りながら動画を楽しもう</p>
    <div class="home-hero-search-wrap">
      <form class="home-search-form" id="heroSearchForm">
        <svg class="home-search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="20" height="20"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="heroSearchInput" class="home-search-input" placeholder="動画を検索..." autocomplete="off" />
        <button type="submit" class="home-search-btn">検索</button>
      </form>
      <ul id="heroSuggestions" class="suggestions-list" hidden></ul>
    </div>
  </section>

  <section class="home-recommend">
    <div class="home-tabs">
      <button class="home-tab active" data-tab="recommend">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        おすすめ
      </button>
      <button class="home-tab" data-tab="trending">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        トレンド
      </button>
    </div>
    <div id="recommendGrid" class="video-grid">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>読み込み中...</p>
      </div>
    </div>
  </section>
</main>
{% endblock %}
